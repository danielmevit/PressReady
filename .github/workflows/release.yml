name: Release

# Builds every distributable on a version tag (and on demand).
#
# PyInstaller cannot cross-compile, so there is one job per target rather than a
# matrix on a single runner. Every job runs the test suite and the headless --smoke
# check before packaging: a broken build should never reach a release page.
#
# Binaries are unsigned — Windows SmartScreen and macOS Gatekeeper will warn on first
# run. That is documented in the README and docs/ai/GOTCHAS.md.
#
# Build jobs only upload artifacts; the single `release` job at the bottom publishes
# them. Letting all five build jobs create the release themselves means five runners
# racing to create the same thing — which ends in a duplicate-create error or a
# release page that is missing whichever platform lost the race.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            python-arch: x64
          - arch: x86     # 32-bit: portable only, for older machines
            python-arch: x86
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Tests
        run: pytest -q

      - name: Smoke gate
        run: python -m pressready --smoke
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build portable ZIP (+ MSIX on x64)
        run: powershell -ExecutionPolicy Bypass -File packaging\windows\build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: pressready-windows-${{ matrix.arch }}
          path: |
            dist/PressReady-*-windows-*-portable.zip
            dist/PressReady-*-windows-x64.msix
          if-no-files-found: error


  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Tests
        run: xvfb-run -a pytest -q

      - name: Smoke gate
        run: xvfb-run -a python -m pressready --smoke

      - name: Build tar.gz
        run: bash packaging/linux/build.sh

      - name: Smoke gate on the built bundle
        run: |
          tar -xzf dist/PressReady-*-linux-x86_64.tar.gz -C /tmp
          xvfb-run -a /tmp/PressReady-*-linux-x86_64/PressReady --smoke

      - uses: actions/upload-artifact@v4
        with:
          name: pressready-linux
          path: dist/PressReady-*-linux-x86_64.tar.gz
          if-no-files-found: error


  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple silicon
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Tests
        run: pytest -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Smoke gate
        run: python -m pressready --smoke

      - name: Build .dmg
        run: bash packaging/macos/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: pressready-macos-${{ matrix.arch }}
          path: dist/PressReady-*-macos-*.dmg
          if-no-files-found: error

  release:
    name: Publish the release
    needs: [windows, linux, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect every platform's artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show what will be published
        run: ls -lh artifacts

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          body: |
            PDF imposition for print — lay your pages out on the press sheet.

            **Windows** — `.msix` installs; the `-portable.zip` just unzips and runs.
            A 32-bit portable build is here for older machines.
            **macOS** — `.dmg`, drag to Applications. First launch: right-click → Open.
            **Linux** — extract the `.tar.gz` and run `./PressReady`. No Python needed.

            Nothing is signed yet, so Windows and macOS will warn about an unknown
            publisher on first run. On Windows that's **More info → Run anyway**.

            What changed is in [CHANGELOG.md](https://github.com/danielmevit/pressready/blob/main/CHANGELOG.md).
            The site is at https://danielmevit.github.io/pressready/.

            If you have the February build (published then as v2.0.0) installed, remove
            it first — its MSIX declares 2.0.0.0 internally and Windows will not install
            an older version over a newer one:
            `Get-AppxPackage PressReadyTeam.PressReady | Remove-AppxPackage`
