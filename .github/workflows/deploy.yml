name: Deploy Laydown to Pages

# Builds the Astro site in site/ and publishes it to
# https://danielmevit.github.io/laydown
#
# (This replaced a version that uploaded the repository root. That would have served
# the raw repo as the website — no index.html at the root, so no site.)

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
      # The site reads the version from here at build time; without this the page
      # advertises whatever version was current at the last site/ edit.
      - "laydown/__init__.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the site
        uses: withastro/action@v3
        with:
          package-manager: npm
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
